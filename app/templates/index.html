<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Mietpreisvorhersage München</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="card">
    <h1>Mietpreisvorhersage mit München 🏠</h1>
    <p class="subtitle">Gib ein paar Eckdaten zu einer Wohnung an und erhalte eine geschätzte Miete.</p>

    <form method="POST">
      <label for="living_space">Wohnfläche (qm)</label>
      <input type="number" step="0.1" id="living_space" name="living_space" required>

      <label for="no_rooms">Zimmeranzahl</label>
      <input type="number" step="0.5" id="no_rooms" name="no_rooms" required>

      <label for="year_constructed">Baujahr</label>
      <input type="number" id="year_constructed" name="year_constructed" required>

      <label for="condition">Zustand</label>
      <select id="condition" name="condition">
        <option value="well_kept">Gepflegt</option>
        <option value="refurbished">Renoviert</option>
        <option value="first_time_use">Erstbezug</option>
        <option value="fully_renovated">Kernsaniert</option>
        <option value="need_of_renovation">Renovierungsbedürftig</option>
      </select>

      <button type="submit">Miete schätzen</button>
    </form>

    {% if prediction is not none %}
      <div class="result">
        Geschätzte Miete: <strong>{{ prediction }} €</strong>
      </div>
      {% endif %}

      {% if chart %}
      <div class="chart">
        <img src="data:image/png;base64,{{ chart }}" alt="Grafik: Modelvorhersage vs. echte Daten">
      </div>
    {% endif %}

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
  </main>
</body>
</html>
